<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu com Efeito Hover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container do menu */
        .menu-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Lista do menu */
        .menu {
            list-style: none;
            display: flex;
            gap: 10px;
        }

        /* Itens do menu */
        .menu li {
            position: relative;
        }

        /* Links do menu */
        .menu a {
            display: inline-block;
            padding: 12px 24px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Efeito de fundo que desliza (hover) */
        .menu a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            transition: left 0.3s ease;
            z-index: -1;
            border-radius: 30px;
        }

        /* Efeito hover - fundo desliza */
        .menu a:hover::before {
            left: 0;
        }

        /* Efeito de escala no hover */
        .menu a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Efeito de borda inferior animada */
        .menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: white;
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        .menu a:hover::after {
            width: 70%;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .menu {
                flex-direction: column;
                gap: 5px;
            }
            
            .menu-container {
                border-radius: 20px;
            }
            
            .menu a {
                text-align: center;
                width: 200px;
            }
        }

        /* Animação de pulsar no hover (opcional) */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 107, 107, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0);
            }
        }

        .menu a:active {
            animation: pulse 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <ul class="menu">
            <li><a href="#">🏠 Início</a></li>
            <li><a href="#">📁 Sobre</a></li>
            <li><a href="#">💼 Serviços</a></li>
            <li><a href="#">📞 Contato</a></li>
            <li><a href="#">✨ Blog</a></li>
        </ul>
    </div>
</body>
</html>
